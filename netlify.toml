[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Timeout extendido para gemini-proxy (generación de imágenes puede tardar 25-30s)
[functions."gemini-proxy"]
  timeout = 30

# Redirigir el webhook de MP
[[redirects]]
  from = "/webhook/mp"
  to = "/.netlify/functions/mp-webhook"
  status = 200

[[redirects]]
  from = "/api/verify-payment"
  to = "/.netlify/functions/verify-payment"
  status = 200
